# Standalone, SHARED MCP server (SSE on :8000). This is the SINGLE factorio-ai-tools
# instance — point every consumer (the Discord bot, Claude Desktop via mcp-remote, etc.)
# at it instead of each spinning up its own copy. The bge embedding model + 6 LanceDB
# stores are ~1 GB in RAM and slow to cold-start, so you want exactly one process.
#
# Cross-stack sharing: this service joins the EXTERNAL `factorio-shared` network so
# containers from OTHER compose projects (the Discord bot at ../factorio-ai-tools-
# discordbot) reach it by service name at  http://factorio-ai-tools:8000/sse.
# Create the network once (idempotent):
#     docker network create factorio-shared
# The host port is also published, so Claude Desktop can connect from the host via:
#     npx -y mcp-remote http://localhost:8000/sse
services:
  factorio-ai-tools:
    build: .
    ports:
      - "8000:8000"                 # host access (Claude Desktop via mcp-remote, debugging)
    environment:
      # Bind ALL interfaces. Without this the server binds 127.0.0.1 INSIDE the container,
      # so both the published port and shared-network access are refused — this is the line
      # that lets other containers/the host actually connect. mcp>=1.x ignores this env on
      # its own; server.py reads FASTMCP_HOST and passes host= to FastMCP.
      FASTMCP_HOST: "0.0.0.0"
    volumes:
      - ./data:/app/data                                    # this repo's local stores (incl. in-progress builds)
      - C:\Users\Solar\.cache\huggingface:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - factorio-shared

networks:
  factorio-shared:
    external: true
