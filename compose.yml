services:
  factorio-ai-tools:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - C:\Users\Solar\.cache\huggingface:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
